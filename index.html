<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kings Cup</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      background-color: #2c2c2c; /* Dark grey background */
      color: white;
    }

    .header-bar {
      background-color: #131313f7;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-link {
      color: #f5a623;
      font-size: 24px;
      text-decoration: none;
      font-weight: bold;
    }

    .dropdown {
      position: relative;
      display: inline-block;
    }

    .dropbtn {
      background-color: #131313;
      color: white;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      cursor: pointer;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      background-color: #333;
      min-width: 160px;
      box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.2);
      z-index: 1;
    }

    .dropdown-content a {
      color: white;
      padding: 12px 16px;
      text-decoration: none;
      display: block;
    }

    .dropdown-content a:hover {
      background-color: #ddd;
    }

    .dropdown-content.show {
      display: block;
    }

    footer {
      background-color: #131313f7;
      padding: 10px;
      text-align: center;
      width: 100%;
      margin-top: 0; /* Ensure no extra margin at the top */
    }

    footer a {
      color: #f5a623;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }

    /* Ensures footer stays at the bottom on desktop */
    .main-content {
      flex: 1;
    }

    /* Mobile responsiveness: adds enough space at the bottom of the content for the footer */
    @media (max-width: 600px) {
      .content {
        padding-bottom: 70px;
      }
    }
  </style>
</head>
<body>
  <!-- Header Bar -->
  <header class="header-bar">
    <a href="https://kay-who-codes.github.io/Kings-Cup/" class="header-link">Kings Cup</a>
    <div class="dropdown">
      <button class="dropbtn" onclick="toggleDropdown(event)">More Apps</button>
      <div class="dropdown-content">
        <a href="https://kay-who-codes.github.io/Misanthrocards/">⬛ Misanthrocards</a>
        <a href="https://kay-who-codes.github.io/Kings-Cup/">🍻 Kings Cup</a>
        <a href="https://kay-who-codes.github.io/Would-You-Rather/">❓ Would You Rather</a>
        <a href="https://kay-who-codes.github.io/invention-cards/">💡 Invention Cards</a>
        <a href="https://kay-who-codes.github.io/Job-Cards/">👔 Job Cards</a>
        <a href="https://kay-who-codes.github.io/Soundboard/">🔊 Soundboard</a>
        <a href="https://kay-who-codes.github.io/Skint-Countdown/">⌛ Skint Countdown</a>
        <a href="https://kay-who-codes.github.io/song-inspirator/">🎶 Song Inspirator</a>
        <a href="https://kay-who-codes.github.io/random-numbers/">🔢 Random Number Generator</a>
        <a href="https://github.com/kay-who-codes/coinflip">🪙 Coinflip</a>
      </div>
    </div>
  </header>

  <div class="main-content">
    <div class="card-container">
      <div class="card" id="card" onclick="flipCard()">
        <div class="card-front" id="card-front">
          KINGS CUP
        </div>
        <div class="card-back" id="card-back">
          <!-- Content dynamically inserted -->
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    Made by <a href="https://linktr.ee/kaywhocreates" target="_blank" rel="noopener noreferrer">Kay 🧡</a>
  </footer>

  <script>
    // Toggle the visibility of the "More Apps" dropdown when the button is clicked
    function toggleDropdown(event) {
      event.stopPropagation();  // Prevent the click event from propagating to the document
      const dropdownContent = document.querySelector('.dropdown-content');
      dropdownContent.classList.toggle('show');
    }

    // Close the dropdown if clicked outside of the dropdown button or content
    function closeDropdown(event) {
      const dropdownContent = document.querySelector('.dropdown-content');
      const dropdownButton = document.querySelector('.dropbtn');
      
      // Check if the click was outside the dropdown or button
      if (!dropdownButton.contains(event.target) && !dropdownContent.contains(event.target)) {
        dropdownContent.classList.remove('show');
      }
    }

    // Add event listener to document to close the dropdown if clicked outside
    document.addEventListener('click', closeDropdown);

    // Call toggleDropdown when the dropdown button is clicked
    document.querySelector('.dropbtn').addEventListener('click', toggleDropdown);
  </script>
</body>
</html>
